<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PBX Popup</title>
  <style>
    :root {
      --chrome: #334762;
      --panel: #101926;
      --panel-deep: #0c1522;
      --panel-inner: #0b1421;
      --line: #233851;
      --title: #f3f7fe;
      --text: #edf3fb;
      --muted: #aebccf;
      --icon: #a7b7cb;
      --mint: #d7f7df;
      --mint-text: #17371f;
      --active: #42f1ba;
      --row-hover: #1a2433;
      --row-selected: #222e40;
      --row-accent: #ff851b;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      background: transparent;
      font-family: "Segoe UI", "Segoe UI Variable", Tahoma, Arial, sans-serif;
      text-rendering: auto;
      overflow: hidden;
    }

    body {
      display: grid;
      place-items: start;
    }

    .call-popup {
      width: 367px;
      height: 207px;
      overflow: hidden;
      color: var(--text);
      background: var(--panel);
      border: 1px solid #284260;
      border-radius: 7px;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.04),
        0 0 0 1px rgba(5, 13, 24, 0.58);
      animation: popup-slide-up 680ms cubic-bezier(0.18, 0.82, 0.22, 1) both;
    }

    .call-popup__titlebar {
      height: 43px;
      padding: 7px 10px 0 12px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      column-gap: 10px;
      align-items: start;
      background: var(--chrome);
    }

    .call-popup--has-balance .call-popup__titlebar {
      grid-template-columns: minmax(0, 1fr) auto auto;
    }

    .call-popup__identity {
      min-width: 0;
    }

    .call-popup__number,
    .call-popup__company-top,
    .call-popup__company,
    .call-popup__status,
    .call-popup__duration,
    .call-popup__contacts {
      font-variant-ligatures: none;
    }

    .call-popup__number {
      display: block;
      color: var(--title);
      font-size: 15px;
      font-weight: 700;
      line-height: 17px;
      letter-spacing: 0.05px;
    }

    .call-popup__company-top {
      display: block;
      margin-top: 1px;
      color: #f0f5fc;
      font-size: 12px;
      font-weight: 600;
      line-height: 15px;
      letter-spacing: 0.2px;
    }

    .call-popup--entersoftone .call-popup__company-top {
      font-size: 11px;
      letter-spacing: 0.02px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .call-popup__balance {
      display: none;
      padding-top: 4px;
      color: #f2bd3b;
      font-size: 12px;
      font-weight: 700;
      line-height: 15px;
      white-space: nowrap;
    }

    .call-popup--has-balance .call-popup__balance {
      display: inline;
    }

    .call-popup__window-actions {
      display: inline-flex;
      align-items: center;
      gap: 13px;
      padding-top: 5px;
      color: #b7c6d9;
    }

    .call-popup__window-icon {
      width: 13px;
      height: 13px;
      display: block;
      overflow: visible;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.25;
      stroke-linecap: round;
      shape-rendering: geometricPrecision;
    }

    .call-popup__body {
      height: 131px;
      padding: 7px 7px 5px;
      background: var(--panel);
      border-bottom: 1px solid #22334a;
    }

    .call-popup__contact-row {
      height: 119px;
      padding: 0;
      background: var(--panel-inner);
      border-radius: 5px;
      overflow: hidden;
    }

    .call-popup__note {
      display: none;
      height: 18px;
      padding: 0 10px;
      color: #ff5f56;
      font-size: 11px;
      font-weight: 700;
      line-height: 17px;
      letter-spacing: 0.08px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .call-popup--has-note .call-popup__body {
      padding-top: 4px;
    }

    .call-popup--has-note .call-popup__note {
      display: block;
    }

    .call-popup--has-note .call-popup__contact-row {
      height: 101px;
    }

    .call-popup__contact-line {
      position: relative;
      height: 30px;
      padding: 0 12px 0 11px;
      display: grid;
      grid-template-columns: 19px max-content minmax(72px, 1fr);
      align-items: center;
      column-gap: 10px;
      background: transparent;
      border-radius: 0;
      transition: background-color 160ms ease;
      cursor: default;
    }

    .call-popup__contact-line:hover {
      background: var(--row-hover);
    }

    .call-popup__contact-line.is-selected,
    .call-popup__contact-line[aria-selected="true"] {
      background: var(--row-selected);
    }

    .call-popup__contact-line.is-selected::before,
    .call-popup__contact-line[aria-selected="true"]::before {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      left: 0;
      width: 3px;
      background: var(--row-accent);
      border-radius: 0 3px 3px 0;
      box-shadow: 0 0 8px rgba(255, 133, 27, 0.32);
    }

    .call-popup__people-icon {
      width: 19px;
      height: 18px;
      display: block;
      color: var(--icon);
      fill: currentColor;
      shape-rendering: geometricPrecision;
    }

    .call-popup__people-icon--truck {
      width: 18px;
      height: 14px;
      transform: translateY(1px);
    }

    .call-popup__company {
      min-width: max-content;
      color: #f1f5fb;
      font-size: 14px;
      font-weight: 350;
      line-height: 18px;
      letter-spacing: 0.06px;
      white-space: nowrap;
    }

    .call-popup__contacts {
      justify-self: end;
      width: 72px;
      height: 22px;
      margin: 0;
      padding: 0 10px;
      border: 1px solid currentColor;
      border-radius: 999px;
      background: rgba(221, 231, 242, 0.09);
      font: 700 12px/18px "Segoe UI", Tahoma, Arial, sans-serif;
      letter-spacing: 0.04px;
      text-align: center;
      white-space: nowrap;
    }

    .call-popup__contacts--neutral {
      color: #d8d8d8;
      background: rgba(216, 216, 216, 0.055);
      box-shadow:
        inset 0 0 12px rgba(255, 255, 255, 0.03),
        0 0 5px rgba(255, 255, 255, 0.045);
    }

    .call-popup__people-icon--accent {
      color: #ff8a3d;
      filter: drop-shadow(0 0 6px rgba(255, 138, 61, 0.18));
    }

    .call-popup__footer {
      height: 31px;
      padding: 0 15px;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      background: var(--panel);
    }

    .call-popup__status {
      color: var(--muted);
      font-size: 12px;
      font-weight: 400;
      line-height: 15px;
      letter-spacing: 0.04px;
    }

    .call-popup__duration {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      color: var(--active);
      font-size: 13px;
      font-weight: 700;
      line-height: 15px;
      letter-spacing: 0.08px;
      opacity: 1;
      transition: opacity 180ms ease;
    }

    .call-popup__duration[hidden] {
      display: inline-flex;
      visibility: hidden;
      opacity: 0;
    }

    .call-popup__clock-icon {
      width: 14px;
      height: 14px;
      display: block;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.75;
      stroke-linecap: round;
      stroke-linejoin: round;
      shape-rendering: geometricPrecision;
    }

    @keyframes popup-slide-up {
      from {
        opacity: 0;
        transform: translateY(100vh);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .call-popup {
        animation: none;
      }
    }
  </style>
</head>
<body>
  <section class="call-popup" aria-label="&#928;&#945;&#961;&#940;&#952;&#965;&#961;&#959; &#954;&#955;&#942;&#963;&#951;&#962;" data-i18n-aria-label="popupLabel">
    <header class="call-popup__titlebar">
      <div class="call-popup__identity">
        <span class="call-popup__number">2310527939</span>
        <span class="call-popup__company-top">NORTHCOM TECHNOLOGIES IKE</span>
      </div>
      <span class="call-popup__balance">170,36&#8364;</span>
      <div class="call-popup__window-actions" aria-hidden="true">
        <svg class="call-popup__window-icon" viewBox="0 0 13 13">
          <path d="M2.5 6.5H10.5"></path>
        </svg>
        <svg class="call-popup__window-icon" viewBox="0 0 13 13">
          <path d="M2.7 2.7L10.3 10.3M10.3 2.7L2.7 10.3"></path>
        </svg>
      </div>
    </header>

    <main class="call-popup__body">
      <div class="call-popup__note" id="customerNote">Τηλεφωνική ενημέρωση πριν την παράδοση.</div>
      <div class="call-popup__contact-row" role="listbox" aria-label="Contact records">
        <div class="call-popup__contact-line" role="option" aria-selected="false" tabindex="0">
          <svg class="call-popup__people-icon" viewBox="0 0 19 18" aria-hidden="true">
            <path d="M6.1 8.1c2.23 0 4.05 1.82 4.05 4.05v2.15H1.7v-2.15C1.7 9.92 3.87 8.1 6.1 8.1Z"></path>
            <circle cx="6.1" cy="4.45" r="3.05"></circle>
            <path d="M13.25 8.6c2.12 0 3.85 1.73 3.85 3.85v1.85h-5.35v-2.15c0-1.32-.48-2.53-1.28-3.47.77-.08 1.69-.08 2.78-.08Z"></path>
            <circle cx="12.65" cy="4.85" r="2.75"></circle>
          </svg>
          <span class="call-popup__company">NORTHCOM TECHNOLOGIES IKE</span>
          <button class="call-popup__contacts call-popup__contacts--neutral" type="button" data-i18n="contacts">Επαφές</button>
        </div>
      </div>
    </main>

    <footer class="call-popup__footer">
      <span class="call-popup__status" id="callStatus">Offering</span>
      <span class="call-popup__duration" id="callDuration" hidden>
        <svg class="call-popup__clock-icon" viewBox="0 0 16 16" aria-hidden="true">
          <circle cx="8" cy="8" r="6.2"></circle>
          <path d="M8 4.45V8l2.35 2.35"></path>
        </svg>
        <span id="callTimer">00:00:00</span>
      </span>
    </footer>
  </section>

  <script>
    const popup = document.querySelector(".call-popup");
    const callStatus = document.getElementById("callStatus");
    const callDuration = document.getElementById("callDuration");
    const callTimer = document.getElementById("callTimer");
    const contactsIcon = document.querySelector(".call-popup__people-icon");
    const numberLabel = document.querySelector(".call-popup__number");
    const companyTopLabel = document.querySelector(".call-popup__company-top");
    const companyLabel = document.querySelector(".call-popup__company");
    const contactsButton = document.querySelector(".call-popup__contacts");
    const customerNote = document.getElementById("customerNote");
    const contactLines = Array.from(document.querySelectorAll(".call-popup__contact-line"));
    const params = new URLSearchParams(window.location.search);
    const translations = {
      el: {
        popupLabel: "Παράθυρο κλήσης",
        contacts: "Επαφές",
        supplier: "Προμη...",
        customerNote: "Τηλεφωνική ενημέρωση πριν την παράδοση.",
        entersoftoneName: "ENTERSOFTONE ΑΝΩΝΥΜΗ ΕΤΑΙΡΕΙΑ",
        entersoftoneShortName: "ENTERSOFTONE ΑΝΩΝΥΜΗ ΕΤ...",
        offering: "Offering",
        connected: "Connected"
      },
      en: {
        popupLabel: "Call popup",
        contacts: "Contacts",
        supplier: "Supplier",
        customerNote: "Phone update before delivery.",
        entersoftoneName: "ENTERSOFTONE S.A.",
        entersoftoneShortName: "ENTERSOFTONE S.A.",
        offering: "Offering",
        connected: "Connected"
      }
    };
    const rawCase = (
      params.get("case") ||
      params.get("popupCase") ||
      params.get("variant") ||
      ""
    ).toLowerCase();
    const requestedLang = params.get("lang");
    const language = requestedLang === "en" || requestedLang === "el"
      ? requestedLang
      : "el";
    const copy = translations[language];
    const selectedCase = rawCase === "2" || rawCase === "case-2" || rawCase === "case2" || rawCase === "balance"
      ? "2"
      : "1";
    const contactsTone = params.get("contacts");
    const recordType = params.get("record");
    const selectedRow = params.get("selected");
    const hasNote = params.get("notes") === "1" || params.get("notes") === "true";
    const noteText = params.get("noteText");
    let connectedAt = null;
    let timerInterval = null;

    popup.dataset.case = selectedCase;
    popup.classList.toggle("call-popup--has-balance", selectedCase === "2");
    popup.classList.toggle("call-popup--has-note", hasNote);
    if (customerNote) customerNote.textContent = noteText || copy.customerNote;
    contactsIcon?.classList.toggle("call-popup__people-icon--accent", contactsTone === "orange");
    document.documentElement.lang = language;

    function selectContactLine(selectedLine) {
      contactLines.forEach((line) => {
        const isSelected = line === selectedLine;
        line.classList.toggle("is-selected", isSelected);
        line.setAttribute("aria-selected", String(isSelected));
      });
    }

    contactLines.forEach((line) => {
      line.addEventListener("click", () => selectContactLine(line));
      line.addEventListener("keydown", (event) => {
        if (event.key !== "Enter" && event.key !== " ") return;
        event.preventDefault();
        selectContactLine(line);
      });
    });

    if (selectedRow === "1" || selectedRow === "true") {
      selectContactLine(contactLines[0]);
    }

    window.addEventListener("message", (event) => {
      if (event.data?.type !== "popup-row-select") return;

      if (event.data.selected) {
        selectContactLine(contactLines[0]);
        return;
      }

      selectContactLine(null);
    });

    document.querySelectorAll("[data-i18n]").forEach((element) => {
      const key = element.dataset.i18n;
      if (copy[key]) element.textContent = copy[key];
    });

    document.querySelectorAll("[data-i18n-aria-label]").forEach((element) => {
      const key = element.dataset.i18nAriaLabel;
      if (copy[key]) element.setAttribute("aria-label", copy[key]);
    });

    if (recordType === "entersoftone") {
      popup.classList.add("call-popup--entersoftone");
      if (numberLabel) numberLabel.textContent = "2111022222";
      if (companyTopLabel) companyTopLabel.textContent = copy.entersoftoneName;
      if (companyLabel) companyLabel.textContent = copy.entersoftoneShortName;
      if (contactsButton) contactsButton.textContent = copy.supplier;
      if (contactsIcon) {
        contactsIcon.classList.add("call-popup__people-icon--truck");
        contactsIcon.setAttribute("viewBox", "0 0 640 512");
        contactsIcon.innerHTML = '<path d="M624 352h-16V244c0-12.7-5.1-24.9-14.1-33.9L494 110.1c-9-9-21.2-14.1-33.9-14.1H416V48c0-26.5-21.5-48-48-48H48C21.5 0 0 21.5 0 48v320c0 26.5 21.5 48 48 48h16c0 53 43 96 96 96s96-43 96-96h128c0 53 43 96 96 96s96-43 96-96h48c8.8 0 16-7.2 16-16v-32c0-8.8-7.2-16-16-16ZM160 464c-26.5 0-48-21.5-48-48s21.5-48 48-48 48 21.5 48 48-21.5 48-48 48Zm320 0c-26.5 0-48-21.5-48-48s21.5-48 48-48 48 21.5 48 48-21.5 48-48 48Zm80-208H416V144h44.1L560 243.9V256Z"></path>';
      }
    }

    callStatus.textContent = copy.offering;

    function formatDuration(totalSeconds) {
      const hours = Math.floor(totalSeconds / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;

      return [hours, minutes, seconds]
        .map((value) => String(value).padStart(2, "0"))
        .join(":");
    }

    function updateTimer() {
      const elapsedSeconds = Math.floor((Date.now() - connectedAt) / 1000);
      callTimer.textContent = formatDuration(elapsedSeconds);
    }

    setTimeout(() => {
      callStatus.textContent = copy.connected;
      callDuration.hidden = false;
      connectedAt = Date.now();
      updateTimer();
      timerInterval = setInterval(updateTimer, 1000);
    }, 500);
  </script>
</body>
</html>
