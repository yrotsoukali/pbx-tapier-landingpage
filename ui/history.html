<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>History Menu</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      background: transparent;
      font-family: "Segoe UI", Tahoma, Arial, sans-serif;
      overflow: hidden;
    }

    body {
      display: grid;
      place-items: start;
      padding: 3px 0 0 3px;
    }

    .history-menu {
      width: 204px;
      min-height: 262px;
      margin: 0;
      padding: 4px 0 5px;
      list-style: none;
      color: #050505;
      background: #f7f7f7;
      border: 1px solid #c9c9c9;
      box-shadow: 1px 1px 2px rgba(0, 0, 0, 0.12);
      font-size: 12px;
      font-weight: 400;
      line-height: 1;
    }

    .history-menu__item {
      position: relative;
      height: 23px;
      padding: 0 24px 0 36px;
      display: flex;
      align-items: center;
      white-space: nowrap;
    }

    .history-menu__item--strong {
      font-weight: 700;
    }

    .history-menu__item:hover,
    .history-menu__item:focus-visible,
    .history-menu__item.is-demo-hover {
      color: #000;
      background: #e5f3ff;
      outline: 1px solid #99d1ff;
      outline-offset: -1px;
    }

    .history-menu__item--has-submenu::after {
      content: "";
      position: absolute;
      top: 50%;
      right: 8px;
      width: 0;
      height: 0;
      border-top: 4px solid transparent;
      border-bottom: 4px solid transparent;
      border-left: 4px solid #111;
      transform: translateY(-50%);
    }

    .history-menu__separator {
      height: 1px;
      margin: 3px 0;
      background: #dddddd;
      border-top: 1px solid #ececec;
    }
  </style>
</head>
<body>
  <ul class="history-menu" role="menu" aria-label="&#924;&#949;&#957;&#959;&#973; &#953;&#963;&#964;&#959;&#961;&#953;&#954;&#959;&#973;">
    <li class="history-menu__item history-menu__item--has-submenu" role="menuitem">&#65;&#110;&#121;&#68;&#101;&#115;&#107;&#67;&#97;&#108;&#108;</li>
    <li class="history-menu__item history-menu__item--has-submenu" role="menuitem">&#931;&#967;&#949;&#964;&#953;&#954;&#941;&#962; &#949;&#961;&#947;&#945;&#963;&#943;&#949;&#962;</li>
    <li class="history-menu__item" role="menuitem">&#902;&#957;&#959;&#953;&#958;&#949; &#949;&#960;&#945;&#966;&#942;</li>
    <li class="history-menu__item history-menu__item--strong" role="menuitem">&#917;&#960;&#949;&#958;. &#922;&#955;&#942;&#963;&#951;&#962;</li>
    <li class="history-menu__separator" role="separator"></li>
    <li class="history-menu__item" data-menu-key="work-in" role="menuitem">&#917;&#961;&#947;&#945;&#963;&#943;&#945; &#949;&#957;&#964;&#972;&#962;</li>
    <li class="history-menu__item" data-menu-key="work-out" role="menuitem">&#917;&#961;&#947;&#945;&#963;&#943;&#945; &#949;&#954;&#964;&#972;&#962;</li>
    <li class="history-menu__separator" role="separator"></li>
    <li class="history-menu__item" role="menuitem">&#925;&#941;&#945; &#949;&#960;&#945;&#966;&#942;</li>
    <li class="history-menu__item" data-menu-key="balance" role="menuitem">&#927;&#953;&#954;&#959;&#957;&#959;&#956;&#953;&#954;&#942; &#922;&#945;&#961;&#964;&#941;&#955;&#945;</li>
    <li class="history-menu__item" role="menuitem">&#928;&#969;&#955;&#942;&#963;&#949;&#953;&#962; &#954;&#945;&#964;&#945; &#949;&#943;&#948;&#959;&#962;</li>
    <li class="history-menu__item" role="menuitem">&#923;&#943;&#963;&#964;&#945; &#928;&#969;&#955;&#942;&#963;&#949;&#969;&#957;</li>
    <li class="history-menu__separator" role="separator"></li>
    <li class="history-menu__item" data-menu-key="order" role="menuitem">&#925;&#941;&#945; &#928;&#945;&#961;&#945;&#947;&#947;&#949;&#955;&#943;&#945;</li>
  </ul>
  <script>
    const hoverItems = document.querySelectorAll("[data-menu-key]");

    window.addEventListener("message", (event) => {
      if (event.data?.type !== "history-hover") return;

      hoverItems.forEach((item) => {
        item.classList.toggle("is-demo-hover", item.dataset.menuKey === event.data.item);
      });
    });
  </script>
</body>
</html>
