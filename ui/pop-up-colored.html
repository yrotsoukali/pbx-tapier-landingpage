<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PBX Popup Colored</title>
  <style>
    :root {
      --chrome: #334762;
      --panel: #101926;
      --panel-inner: #0b1421;
      --line: #22334a;
      --title: #f3f7fe;
      --text: #edf3fb;
      --muted: #aebccf;
      --icon: #a7b7cb;
      --mint: #d7f7df;
      --mint-text: #17371f;
      --active: #42f1ba;
      --badge-bg: #21ff21;
      --badge-text: #031603;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      background: transparent;
      font-family: "Segoe UI", "Segoe UI Variable", Tahoma, Arial, sans-serif;
      text-rendering: auto;
      overflow: hidden;
    }

    body {
      display: grid;
      place-items: start;
    }

    .call-popup {
      width: 367px;
      height: 207px;
      overflow: hidden;
      color: var(--text);
      background: var(--panel);
      border: 1px solid #284260;
      border-radius: 7px;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.04),
        0 0 0 1px rgba(5, 13, 24, 0.58);
      animation: popup-slide-up 680ms cubic-bezier(0.18, 0.82, 0.22, 1) both;
    }

    .call-popup[data-type="no-vip"] {
      --badge-bg: #ff1717;
      --badge-text: #120101;
    }

    .call-popup__titlebar {
      height: 43px;
      padding: 7px 10px 0 12px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      column-gap: 10px;
      align-items: start;
      background: var(--chrome);
    }

    .call-popup__identity {
      min-width: 0;
    }

    .call-popup__number,
    .call-popup__company-top,
    .call-popup__company,
    .call-popup__status,
    .call-popup__duration,
    .call-popup__badge,
    .call-popup__contacts {
      font-variant-ligatures: none;
    }

    .call-popup__number {
      display: block;
      color: var(--title);
      font-size: 15px;
      font-weight: 700;
      line-height: 17px;
      letter-spacing: 0.05px;
    }

    .call-popup__company-top {
      display: block;
      margin-top: 1px;
      color: #f0f5fc;
      font-size: 12px;
      font-weight: 600;
      line-height: 15px;
      letter-spacing: 0.2px;
    }

    .call-popup__window-actions {
      display: inline-flex;
      align-items: center;
      gap: 13px;
      padding-top: 5px;
      color: #b7c6d9;
    }

    .call-popup__window-icon {
      width: 13px;
      height: 13px;
      display: block;
      overflow: visible;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.25;
      stroke-linecap: round;
      shape-rendering: geometricPrecision;
    }

    .call-popup__body {
      height: 131px;
      padding: 7px 7px 5px;
      background: var(--panel);
      border-bottom: 1px solid var(--line);
    }

    .call-popup__contact-list {
      height: 119px;
      padding: 0 12px 0 11px;
      background: var(--panel-inner);
      border-radius: 5px;
    }

    .call-popup__contact-entry {
      height: 31px;
      display: grid;
      grid-template-columns: 19px minmax(0, 1fr) 72px;
      align-items: start;
      column-gap: 10px;
    }

    .call-popup__person-icon,
    .call-popup__people-icon {
      width: 19px;
      height: 18px;
      display: block;
      color: var(--icon);
      fill: currentColor;
      shape-rendering: geometricPrecision;
    }

    .call-popup__person-icon {
      margin-top: 1px;
    }

    .call-popup__people-icon {
      margin-top: 2px;
    }

    .call-popup__company {
      padding-top: 2px;
      min-width: 0;
      overflow: hidden;
      color: #f1f5fb;
      font-size: 14px;
      font-weight: 350;
      line-height: 18px;
      letter-spacing: 0.06px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .call-popup__badge,
    .call-popup__contacts {
      justify-self: end;
      width: 72px;
      height: 22px;
      margin: 0;
      padding: 0 10px;
      border: 1px solid currentColor;
      border-radius: 999px;
      background: rgba(221, 231, 242, 0.09);
      font: 700 12px/18px "Segoe UI", Tahoma, Arial, sans-serif;
      letter-spacing: 0.04px;
      text-align: center;
      white-space: nowrap;
    }

    .call-popup__contacts--urgent,
    .call-popup__contacts--danger {
      color: #ff3737;
      background: rgba(255, 55, 55, 0.12);
      box-shadow:
        inset 0 0 16px rgba(255, 55, 55, 0.08),
        0 0 9px rgba(255, 55, 55, 0.16);
    }

    .call-popup__contacts--success {
      color: #43d98a;
      background: rgba(67, 217, 138, 0.13);
      box-shadow:
        inset 0 0 16px rgba(67, 217, 138, 0.08),
        0 0 9px rgba(67, 217, 138, 0.16);
    }

    .call-popup__contacts--natural {
      color: #d8d8d8;
      background: rgba(216, 216, 216, 0.055);
      box-shadow:
        inset 0 0 12px rgba(255, 255, 255, 0.03),
        0 0 5px rgba(255, 255, 255, 0.045);
    }

    .call-popup__footer {
      height: 31px;
      padding: 0 15px;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      background: var(--panel);
    }

    .call-popup__status {
      color: var(--muted);
      font-size: 12px;
      font-weight: 400;
      line-height: 15px;
      letter-spacing: 0.04px;
    }

    .call-popup__duration {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      color: var(--active);
      font-size: 13px;
      font-weight: 700;
      line-height: 15px;
      letter-spacing: 0.08px;
      opacity: 1;
      transition: opacity 180ms ease;
    }

    .call-popup__duration[hidden] {
      display: inline-flex;
      visibility: hidden;
      opacity: 0;
    }

    .call-popup__clock-icon {
      width: 14px;
      height: 14px;
      display: block;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.75;
      stroke-linecap: round;
      stroke-linejoin: round;
      shape-rendering: geometricPrecision;
    }

    @keyframes popup-slide-up {
      from {
        opacity: 0;
        transform: translateY(100vh);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .call-popup {
        animation: none;
      }
    }
  </style>
</head>
<body>
  <section class="call-popup" data-type="vip" aria-label="&#928;&#945;&#961;&#940;&#952;&#965;&#961;&#959; &#954;&#955;&#942;&#963;&#951;&#962;">
    <header class="call-popup__titlebar">
      <div class="call-popup__identity">
        <span class="call-popup__number">2310527939</span>
        <span class="call-popup__company-top">NORTHCOM TECHNOLOGIES IKE</span>
      </div>
      <div class="call-popup__window-actions" aria-hidden="true">
        <svg class="call-popup__window-icon" viewBox="0 0 13 13">
          <path d="M2.5 6.5H10.5"></path>
        </svg>
        <svg class="call-popup__window-icon" viewBox="0 0 13 13">
          <path d="M2.7 2.7L10.3 10.3M10.3 2.7L2.7 10.3"></path>
        </svg>
      </div>
    </header>

    <main class="call-popup__body">
      <div class="call-popup__contact-list">
        <div class="call-popup__contact-entry">
          <svg class="call-popup__person-icon" viewBox="0 0 19 18" aria-hidden="true">
            <path d="M9.5 9c2.6 0 4.72 2.1 4.72 4.7v1.1H4.78v-1.1C4.78 11.1 6.9 9 9.5 9Z"></path>
            <circle cx="9.5" cy="4.65" r="3.45"></circle>
          </svg>
          <span class="call-popup__company">NORTHCOM TECHNOLOGIES</span>
          <button class="call-popup__badge call-popup__contacts--urgent" id="primaryPill" type="button">&#928;&#949;&#955;&#940;&#964;&#949;&#962;</button>
        </div>

        <div class="call-popup__contact-entry">
          <svg class="call-popup__people-icon" viewBox="0 0 19 18" aria-hidden="true">
            <path d="M6.1 8.1c2.23 0 4.05 1.82 4.05 4.05v2.15H1.7v-2.15C1.7 9.92 3.87 8.1 6.1 8.1Z"></path>
            <circle cx="6.1" cy="4.45" r="3.05"></circle>
            <path d="M13.25 8.6c2.12 0 3.85 1.73 3.85 3.85v1.85h-5.35v-2.15c0-1.32-.48-2.53-1.28-3.47.77-.08 1.69-.08 2.78-.08Z"></path>
            <circle cx="12.65" cy="4.85" r="2.75"></circle>
          </svg>
          <span class="call-popup__company">&#932;&#931;&#927;&#933;&#922;&#913;&#923;&#919;&#931; (NORTHCOM TECHNOLOGIES)</span>
          <button class="call-popup__contacts call-popup__contacts--natural" id="secondaryPill" type="button">&#917;&#960;&#945;&#966;&#941;&#962;</button>
        </div>

      </div>
    </main>

    <footer class="call-popup__footer">
      <span class="call-popup__status" id="callStatus">Offering</span>
      <span class="call-popup__duration" id="callDuration" hidden>
        <svg class="call-popup__clock-icon" viewBox="0 0 16 16" aria-hidden="true">
          <circle cx="8" cy="8" r="6.2"></circle>
          <path d="M8 4.45V8l2.35 2.35"></path>
        </svg>
        <span id="callTimer">00:00:00</span>
      </span>
    </footer>
  </section>

  <script>
    const popup = document.querySelector(".call-popup");
    const primaryPill = document.getElementById("primaryPill");
    const secondaryPill = document.getElementById("secondaryPill");
    const callStatus = document.getElementById("callStatus");
    const callDuration = document.getElementById("callDuration");
    const callTimer = document.getElementById("callTimer");
    const params = new URLSearchParams(window.location.search);
    const rawType = (
      params.get("type") ||
      params.get("customer") ||
      params.get("status") ||
      (params.has("no-vip") ? "no-vip" : "") ||
      (params.has("vip") ? "vip" : "")
    ).toLowerCase();
    const selectedType = rawType === "no-vip" ? "no-vip" : "vip";
    const rawCase = (
      params.get("case") ||
      params.get("popupCase") ||
      params.get("variant") ||
      ""
    ).toLowerCase();
    const selectedCase = rawCase === "2" || rawCase === "case-2" || rawCase === "case2" || rawCase === "success"
      ? "2"
      : "1";
    const initialSeconds = Number.parseInt(params.get("seconds") || "", 10);

    popup.dataset.type = selectedType;
    popup.dataset.case = selectedCase;
    primaryPill.classList.toggle("call-popup__contacts--urgent", selectedCase === "1");
    primaryPill.classList.toggle("call-popup__contacts--success", selectedCase === "2");
    secondaryPill.classList.add("call-popup__contacts--natural");
    callStatus.textContent = selectedType === "no-vip" ? "Ringback" : "Offering";

    function formatDuration(totalSeconds) {
      const hours = Math.floor(totalSeconds / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;

      return [hours, minutes, seconds]
        .map((value) => String(value).padStart(2, "0"))
        .join(":");
    }

    let startedAt = null;
    let timerInterval = null;

    function updateTimer() {
      const elapsedSeconds = Math.floor((Date.now() - startedAt) / 1000);
      callTimer.textContent = formatDuration(elapsedSeconds);
    }

    setTimeout(() => {
      callDuration.hidden = false;
      startedAt = Date.now() - (Number.isNaN(initialSeconds) ? 0 : initialSeconds * 1000);
      updateTimer();
      timerInterval = setInterval(updateTimer, 1000);
    }, 500);
  </script>
</body>
</html>
